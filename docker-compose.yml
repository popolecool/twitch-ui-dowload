services:
  twitch-recorder:
    build: .
    container_name: twitch-recorder
    ports:
      - "8162:8000"
    env_file:
      - .env
    environment:
      APP_SECRET: changeme
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      POLL_INTERVAL_SECONDS: 60
      DATA_DIR: /app/data
      DB_PATH: /app/db/app.db
    volumes:
      - ./data:/app/data
      - ./db:/app/db
