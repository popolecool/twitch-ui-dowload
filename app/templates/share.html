<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>{{ title }}</h1>
        <p class="muted">Channel: {{ channel }}</p>
      </header>
      <section class="card">
        <video controls preload="metadata" src="/share/{{ key }}/media" style="width: 100%;"></video>
      </section>
    </div>
  </body>
</html>
