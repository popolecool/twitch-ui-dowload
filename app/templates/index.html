<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitch Recorder</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Twitch Recorder</h1>
        <p>Monitoring, recording and playlist management</p>
        <div id="userBox" class="muted"></div>
      </header>

      <section id="authSection">
        <h2>Admin login</h2>
        <form id="loginForm">
          <label>Username
            <input name="username" value="admin" autocomplete="username" />
          </label>
          <label>Password
            <input type="password" name="password" autocomplete="current-password" />
          </label>
          <button type="submit">Sign in</button>
        </form>
      </section>

      <section id="appSection" style="display:none">
        <div class="toolbar">
          <button id="logoutBtn" type="button">Sign out</button>
        </div>

        <section class="card">
          <h2>Watched channels</h2>
          <form id="addChannelForm">
            <label>Twitch username
              <input name="twitch_username" required />
            </label>
            <label class="inline">
              <input type="checkbox" name="auto_add_to_playlist" />
              Add to playlist automatically when stream ends
            </label>
            <label>Default playlist
              <select name="auto_playlist_id">
                <option value="">None</option>
              </select>
            </label>
            <button type="submit">Add</button>
          </form>
          <table id="channelsTable">
            <thead>
              <tr><th>Channel</th><th>Status</th><th>Auto playlist</th><th>Actions</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>

        <section class="card">
          <h2>Recordings</h2>
          <table id="recordingsTable">
            <thead>
              <tr><th>Channel</th><th>Date</th><th>Title</th><th>Status</th><th>Public link</th><th>Actions</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>

        <section class="card">
          <h2>Playlists</h2>
          <form id="createPlaylistForm">
            <label>New playlist
              <input name="name" placeholder="Season 1" required />
            </label>
            <button type="submit">Create</button>
          </form>
          <div id="playlistList"></div>
        </section>
      </section>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
